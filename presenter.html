<meta charset="utf-8" />
<title>Prompter</title>
<style>
  :root { --ink: #ffffff; --dim: #6c6c72; --bg: #000000; --guide: #ff5a4d; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Scroll the DOCUMENT itself (cueprompter method) — the most optimized scroll
     path, so a USB/DisplayLink display can do a cheap region-shift instead of
     resending the whole frame. Hidden scrollbar; we scroll programmatically. */
  html { background: var(--bg); overflow-y: scroll; scrollbar-width: none; }
  html::-webkit-scrollbar { width: 0; height: 0; display: none; }
  body { background: var(--bg); cursor: none; }

  /* NO transform by default — a transform would push the text onto a GPU layer
     and defeat the native-scroll optimization. Only applied when mirrored. */
  #content { }
  #content.mirror { transform: scaleX(-1); transform-origin: center center; }

  #script {
    color: var(--ink);
    font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
    font-weight: 600; font-size: 72px; line-height: 1.45; text-align: center;
    max-width: 94%; margin: 0 auto; padding: 0 3%;
  }
  .seg { margin: 0 0 0.5em; white-space: pre-wrap; word-break: break-word; }
  .w { transition: color .12s ease; }
  .w.spoken { color: var(--dim); }
  .marker {
    text-align: center; color: var(--guide); font-size: 0.42em; font-weight: 700;
    letter-spacing: 3px; margin: 0.6em 0; opacity: 0.8;
  }
  .pad-top { height: 45vh; }
  .pad-bottom { height: 95vh; }

  #guide { position: fixed; left: 0; right: 0; top: 45%; height: 0; pointer-events: none; z-index: 5; }
  #guide .line { position: absolute; left: 8%; right: 8%; top: 0; height: 3px; background: var(--guide); opacity: 0.5; }
  #guide .tri { position: absolute; top: -9px; width: 0; height: 0; border-top: 10px solid transparent; border-bottom: 10px solid transparent; }
  #guide .tri.left { left: 2%; border-left: 16px solid var(--guide); }
  #guide .tri.right { right: 2%; border-right: 16px solid var(--guide); }

  #hint {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    text-align: center; color: rgba(255,255,255,0.4); font-family: system-ui, sans-serif;
    font-size: 22px; line-height: 1.6; padding: 0 10%; z-index: 6;
  }
</style>

<div id="content">
  <div class="pad-top"></div>
  <div id="script"></div>
  <div class="pad-bottom"></div>
</div>
<div id="guide"><div class="tri left"></div><div class="line"></div><div class="tri right"></div></div>
<div id="hint">Your script will appear here.<br />Control it from the laptop or your phone.</div>

<script>if(!window.api){document.write('<script src="web-api.js"><\/'+'script>')}</script>
<script src="segments.js"></script>
<script src="presenter.js"></script>
