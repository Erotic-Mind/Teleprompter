<meta charset="utf-8" />
<title>Prompter</title>
<style>
  :root {
    --ink: #ffffff;
    --dim: #7c7c82;
    --bg: #000000;
    --guide: #ff5a4d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    cursor: none;
  }
  #stage { position: fixed; inset: 0; overflow: hidden; background: var(--bg); }

  /* The layer that moves and gets mirrored. */
  #scroller {
    position: absolute; left: 0; right: 0; top: 0;
    will-change: transform;
    transform-origin: center center;
  }
  #script {
    font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
    font-weight: 600;
    font-size: 72px;
    line-height: 1.42;
    text-align: center;
    max-width: 94%;
    margin: 0 auto;
    padding: 0 3%;
  }
  .seg {
    color: var(--dim);
    margin: 0 0 0.55em;
    transition: color .15s ease;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .seg.current { color: var(--ink); text-shadow: 0 2px 10px rgba(0,0,0,0.55); }

  .pad-top { height: 42vh; }
  .pad-bottom { height: 92vh; }

  /* Fixed reading guide — above the moving layer so it stays put. */
  #guide { position: fixed; left: 0; right: 0; top: 42%; height: 0; pointer-events: none; z-index: 5; }
  #guide .line { position: absolute; left: 8%; right: 8%; top: 0; height: 3px; background: var(--guide); opacity: 0.5; }
  #guide .tri { position: absolute; top: -9px; width: 0; height: 0; border-top: 10px solid transparent; border-bottom: 10px solid transparent; }
  #guide .tri.left  { left: 2%;  border-left: 16px solid var(--guide); }
  #guide .tri.right { right: 2%; border-right: 16px solid var(--guide); }

  #hint {
    position: fixed; left: 0; right: 0; top: 50%; transform: translateY(-50%);
    text-align: center; color: rgba(255,255,255,0.4);
    font-family: system-ui, sans-serif; font-size: 22px; line-height: 1.6; padding: 0 10%;
    z-index: 6;
  }
</style>

<div id="stage">
  <div id="scroller">
    <div class="pad-top"></div>
    <div id="script"></div>
    <div class="pad-bottom"></div>
  </div>
  <div id="guide">
    <div class="tri left"></div>
    <div class="line"></div>
    <div class="tri right"></div>
  </div>
  <div id="hint">Your script will appear here.<br />Control everything from the laptop window.</div>
</div>

<script>if(!window.api){document.write('<script src="web-api.js"><\/'+'script>')}</script>
<script src="segments.js"></script>
<script src="presenter.js"></script>
